<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результаты - MySearch</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff;
        }

        header {
            background-color: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 1px solid #ebebeb;
            display: flex;
            align-items: center;
        }

            header h1 {
                font-size: 24px;
                margin-right: 30px;
                cursor: pointer;
                color: #4285F4;
                text-decoration: none;
            }

        .results-container {
            max-width: 700px;
            margin-left: 150px;
            padding: 20px;
        }

        .result-item {
            margin-bottom: 30px;
        }

            .result-item a {
                font-size: 20px;
                color: #1a0dab;
                text-decoration: none;
            }

                .result-item a:hover {
                    text-decoration: underline;
                }

            .result-item cite {
                color: #006621;
                font-style: normal;
                font-size: 14px;
                display: block;
                margin-bottom: 4px;
            }

        .score {
            color: #70757a;
            font-size: 13px;
            margin-top: 5px;
        }

        .no-results {
            color: #70757a;
            font-size: 18px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="text-decoration: none;"><h1>MySearch</h1></a>
    </header>
    <div class="results-container">
        <div id="results">
            {{RESULTS}}
        </div>
    </div>
</body>
</html>
